<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" role="img" aria-label="SK하이닉스와 마이크론의 주가수익비율(P/E) 비교 막대그래프">
<title>SK하이닉스와 마이크론의 주가수익비율(P/E) 비교 막대그래프</title><desc>2025년 예상 기준 하이닉스 11배·마이크론 29배, 2026년 예상 기준 하이닉스 7.8배·마이크론 12.6배로, 하이닉스가 마이크론의 절반 이하 배수에 거래되고 있음을 보여준다.</desc>
<style>
  :root{
    --surface:#fcfcfb; --ink:#0b0b0b; --sub:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --blue:#2a78d6; --orange:#eb6834; --aqua:#1baf7a;
    --red:#e34948; --green:#008300; --mute:#b7d3f6;
  }
  @media (prefers-color-scheme:dark){
    :root{ --surface:#1a1a19; --ink:#ffffff; --sub:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --axis:#383835; --blue:#3987e5; --orange:#d95926; --aqua:#199e70;
      --red:#e66767; --green:#31a531; --mute:#2f4b6e; }
  }
  .bg{fill:var(--surface)}
  .title{fill:var(--ink);font:700 20px system-ui,-apple-system,"Segoe UI",sans-serif}
  .sub{fill:var(--sub);font:400 13px system-ui,sans-serif}
  .lbl{fill:var(--ink);font:600 14px system-ui,sans-serif}
  .ax{fill:var(--muted);font:500 13px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .val{fill:var(--ink);font:700 15px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .grid{stroke:var(--grid);stroke-width:1}
  .base{stroke:var(--axis);stroke-width:1.5}
  .s-blue{fill:var(--blue)} .s-orange{fill:var(--orange)} .s-aqua{fill:var(--aqua)}
  .s-red{fill:var(--red)} .s-green{fill:var(--green)} .s-mute{fill:var(--mute)}
  .refline{stroke:var(--orange);stroke-width:1.5;stroke-dasharray:5 4}
  .nowline{stroke:var(--ink);stroke-width:1.5;stroke-dasharray:4 3}
</style>
<rect class="bg" x="0" y="0" width="760" height="470" rx="14"/>
<text class="title" x="40" y="34">SK하이닉스 vs 마이크론 — 주가수익비율(P/E)</text><text class="sub" x="40" y="56">같은 업황·같은 제품군인데 하이닉스가 절반 이하 — '코리아 디스카운트'의 크기</text><rect class="s-blue" x="526" y="26" width="12" height="12" rx="3"/><text class="sub" x="544" y="36">SK하이닉스</text><rect class="s-orange" x="626" y="26" width="12" height="12" rx="3"/><text class="sub" x="644" y="36">마이크론</text><line class="grid" x1="40" y1="414" x2="736" y2="414"/><text class="ax" x="32" y="418" text-anchor="end">0</text><line class="grid" x1="40" y1="308" x2="736" y2="308"/><text class="ax" x="32" y="312" text-anchor="end">10</text><line class="grid" x1="40" y1="202" x2="736" y2="202"/><text class="ax" x="32" y="206" text-anchor="end">20</text><line class="grid" x1="40" y1="96" x2="736" y2="96"/><text class="ax" x="32" y="100" text-anchor="end">30</text><line class="base" x1="40" y1="414" x2="736" y2="414"/><path class="s-blue" d="M131 414 V301.4 q0 -4 4 -4 h68 q4 0 4 4 V414 Z"/><path class="s-orange" d="M221 414 V110.60000000000002 q0 -4 4 -4 h68 q4 0 4 4 V414 Z"/><text class="val" x="169" y="289.4" text-anchor="middle">11배</text><text class="val" x="259" y="98.60000000000002" text-anchor="middle">29배</text><text class="lbl" x="214" y="440" text-anchor="middle">2025년 예상</text><path class="s-blue" d="M479 414 V335.32 q0 -4 4 -4 h68 q4 0 4 4 V414 Z"/><path class="s-orange" d="M569 414 V284.44 q0 -4 4 -4 h68 q4 0 4 4 V414 Z"/><text class="val" x="517" y="323.32" text-anchor="middle">7.8배</text><text class="val" x="607" y="272.44" text-anchor="middle">12.6배</text><text class="lbl" x="562" y="440" text-anchor="middle">2026년 예상</text>
</svg>
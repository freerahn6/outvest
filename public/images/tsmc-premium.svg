<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" role="img" aria-label="TSMC ADR 프리미엄 추이 막대그래프">
<title>TSMC ADR 프리미엄 추이 막대그래프</title><desc>TSMC의 미국 ADR은 타이베이 본주 대비 2025년 12월 약 26%에서 2026년 5월 약 13.7%로 프리미엄이 축소됐으며, 역사적 평균은 약 16%다.</desc>
<style>
  :root{
    --surface:#fcfcfb; --ink:#0b0b0b; --sub:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --blue:#2a78d6; --orange:#eb6834; --aqua:#1baf7a;
    --red:#e34948; --green:#008300; --mute:#b7d3f6;
  }
  @media (prefers-color-scheme:dark){
    :root{ --surface:#1a1a19; --ink:#ffffff; --sub:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --axis:#383835; --blue:#3987e5; --orange:#d95926; --aqua:#199e70;
      --red:#e66767; --green:#31a531; --mute:#2f4b6e; }
  }
  .bg{fill:var(--surface)}
  .title{fill:var(--ink);font:700 20px system-ui,-apple-system,"Segoe UI",sans-serif}
  .sub{fill:var(--sub);font:400 13px system-ui,sans-serif}
  .lbl{fill:var(--ink);font:600 14px system-ui,sans-serif}
  .ax{fill:var(--muted);font:500 13px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .val{fill:var(--ink);font:700 15px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .grid{stroke:var(--grid);stroke-width:1}
  .base{stroke:var(--axis);stroke-width:1.5}
  .s-blue{fill:var(--blue)} .s-orange{fill:var(--orange)} .s-aqua{fill:var(--aqua)}
  .s-red{fill:var(--red)} .s-green{fill:var(--green)} .s-mute{fill:var(--mute)}
  .refline{stroke:var(--orange);stroke-width:1.5;stroke-dasharray:5 4}
  .nowline{stroke:var(--ink);stroke-width:1.5;stroke-dasharray:4 3}
</style>
<rect class="bg" x="0" y="0" width="760" height="340" rx="14"/>
<text class="title" x="44" y="34">참고: TSMC ADR 프리미엄은 '좁혀지는' 중</text><text class="sub" x="44" y="56">본주 대비 프리미엄(%). 하이닉스 ADR도 결국 수렴할지가 관전 포인트</text><line class="grid" x1="44" y1="284" x2="730" y2="284"/><text class="ax" x="36" y="288" text-anchor="end">0%</text><line class="grid" x1="44" y1="220" x2="730" y2="220"/><text class="ax" x="36" y="224" text-anchor="end">10%</text><line class="grid" x1="44" y1="156" x2="730" y2="156"/><text class="ax" x="36" y="160" text-anchor="end">20%</text><line class="grid" x1="44" y1="92" x2="730" y2="92"/><text class="ax" x="36" y="96" text-anchor="end">30%</text><line class="refline" x1="44" y1="181.6" x2="730" y2="181.6"/><text class="sub" x="730" y="173.6" text-anchor="end">역사적 평균 ≈ 16%</text><line class="base" x1="44" y1="284" x2="730" y2="284"/><path class="s-blue" d="M155.5 284 V121.6 q0 -4 4 -4 h112 q4 0 4 4 V284 Z"/><text class="val" x="215.5" y="109.6" text-anchor="middle">26%</text><text class="lbl" x="215.5" y="310" text-anchor="middle">2025년 12월</text><path class="s-blue" d="M498.5 284 V200.32 q0 -4 4 -4 h112 q4 0 4 4 V284 Z"/><text class="val" x="558.5" y="188.32" text-anchor="middle">13.7%</text><text class="lbl" x="558.5" y="310" text-anchor="middle">2026년 5월</text>
</svg>
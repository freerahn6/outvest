<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" width="760" height="260" role="img" aria-label="한미반도체 증권사 목표주가 편차 그래프">
<title>한미반도체 증권사 목표주가 편차 그래프</title><desc>한미반도체 목표주가는 증권사에 따라 LS증권 18만원부터 메릴린치 42만원까지 약 2.3배 차이가 난다.</desc>
<style>
  :root{
    --surface:#fcfcfb; --ink:#0b0b0b; --sub:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --blue:#2a78d6; --orange:#eb6834; --aqua:#1baf7a;
    --red:#e34948; --green:#008300; --mute:#b7d3f6;
  }
  @media (prefers-color-scheme:dark){
    :root{ --surface:#1a1a19; --ink:#ffffff; --sub:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --axis:#383835; --blue:#3987e5; --orange:#d95926; --aqua:#199e70;
      --red:#e66767; --green:#31a531; --mute:#2f4b6e; }
  }
  .bg{fill:var(--surface)}
  .title{fill:var(--ink);font:700 20px system-ui,-apple-system,"Segoe UI",sans-serif}
  .sub{fill:var(--sub);font:400 13px system-ui,sans-serif}
  .lbl{fill:var(--ink);font:600 14px system-ui,sans-serif}
  .ax{fill:var(--muted);font:500 13px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .val{fill:var(--ink);font:700 15px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .grid{stroke:var(--grid);stroke-width:1}
  .base{stroke:var(--axis);stroke-width:1.5}
  .s-blue{fill:var(--blue)} .s-orange{fill:var(--orange)} .s-aqua{fill:var(--aqua)}
  .s-red{fill:var(--red)} .s-green{fill:var(--green)} .s-mute{fill:var(--mute)}
  .refline{stroke:var(--orange);stroke-width:1.5;stroke-dasharray:5 4}
  .nowline{stroke:var(--ink);stroke-width:1.5;stroke-dasharray:4 3}
</style>
<rect class="bg" x="0" y="0" width="760" height="260" rx="14"/>
<text class="title" x="60" y="38">한미반도체 목표주가 — 증권사끼리도 2.3배 차이</text><text class="sub" x="60" y="62">LS증권 18만 ~ 메릴린치 42만. '확실한 가치'가 아니라 'HBM4 발주 베팅'이라는 신호</text><line class="grid" x1="60" y1="104" x2="60" y2="168"/><text class="ax" x="60" y="188" text-anchor="middle">0만</text><line class="grid" x1="200" y1="104" x2="200" y2="168"/><text class="ax" x="200" y="188" text-anchor="middle">10만</text><line class="grid" x1="340" y1="104" x2="340" y2="168"/><text class="ax" x="340" y="188" text-anchor="middle">20만</text><line class="grid" x1="480" y1="104" x2="480" y2="168"/><text class="ax" x="480" y="188" text-anchor="middle">30만</text><line class="grid" x1="620" y1="104" x2="620" y2="168"/><text class="ax" x="620" y="188" text-anchor="middle">40만</text><rect class="s-mute" x="312" y="118" width="336" height="40" rx="8"/><circle class="s-blue" cx="312" cy="138" r="9"/><circle class="s-green" cx="648" cy="138" r="9"/><text class="val" x="312" y="106" text-anchor="middle">18만 (LS증권)</text><text class="val" x="648" y="106" text-anchor="middle">42만 (메릴린치)</text>
</svg>
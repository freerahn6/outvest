<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="상폐 위기 애국테마주 급등">
<defs>
  <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#d9534f" stop-opacity="0.16"/>
    <stop offset="1" stop-color="#d9534f" stop-opacity="0.02"/>
  </linearGradient>
</defs>
<style>
  .bg{fill:#f8f5f5} .blob{fill:#d9534f;opacity:0.10}
  .eye{fill:#c0392b;font:700 27px system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:1px}
  .ttl{fill:#1b1d20;font:800 60px system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:-1.5px}
  .brand{fill:#8f8a8a;font:600 24px system-ui,sans-serif}
  .tkr{fill:#c0392b;font:700 26px system-ui,sans-serif;font-variant-numeric:tabular-nums}
  .tkrbox{fill:none;stroke:#d9534f;stroke-width:2}
  .line{fill:none;stroke:#d9534f;stroke-width:4;stroke-linejoin:round;stroke-linecap:round}
  .dash{fill:none;stroke:#c0392b;stroke-width:2.5;stroke-dasharray:8 8;opacity:0.6}
</style>
<rect class="bg" width="1200" height="675"/>
<circle class="blob" cx="1040" cy="130" r="250"/>
<path d="M0 470 L150 520 L300 560 L450 590 L600 600 L720 300 L840 180 L960 360 L1080 300 L1200 340 L1200 675 L0 675 Z" fill="url(#g)"/>
<path d="M0 470 L150 520 L300 560 L450 590 L600 600 L720 300 L840 180 L960 360 L1080 300 L1200 340" class="line"/>
<path d="M0 560 L1200 560" class="dash"/>
<text x="1130" y="548" text-anchor="end" class="tkr" fill="#c0392b" style="font-size:20px;opacity:0.75">상폐 문턱</text>
<text x="80" y="132" class="eye">시황 · 테마</text>
<text x="80" y="292" class="ttl">상폐 위기인데</text><text x="80" y="368" class="ttl">왜 급등하나</text>
<rect class="tkrbox" x="80" y="556" width="150" height="44" rx="22"/>
<text x="104" y="585" class="tkr">애국테마주</text>
<text x="1120" y="620" text-anchor="end" class="brand">아웃베스트의 투자로그</text>
</svg>

name = "kis-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# 실전투자 도메인이 기본값입니다. 모의투자로 테스트하려면 아래를 바꾸세요.
[vars]
KIS_BASE = "https://openapi.koreainvestment.com:9443"
# 배포 후 블로그 도메인으로 좁히는 것을 권장 (예: "https://내도메인.com")
ALLOW_ORIGIN = "*"

# 앱키/시크릿은 vars 가 아니라 secret 으로 등록하세요 (커밋 금지):
#   npx wrangler secret put KIS_APP_KEY
#   npx wrangler secret put KIS_APP_SECRET
#
# (선택) 토큰 캐시용 KV 를 쓰려면 아래 주석을 풀고 id 를 채우세요:
# [[kv_namespaces]]
# binding = "KIS_TOKEN"
# id = "여기에_KV_네임스페이스_ID"
